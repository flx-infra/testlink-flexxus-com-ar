version: '3.6'

services:
  testlink-db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=Flexxus2023**
      - MYSQL_DATABASE=testlink
      - MYSQL_USER=testlink
      - MYSQL_PASSWORD=Flexxus2023**
    volumes:
      - testlink-db-data:/var/lib/mysql
    deploy:
      placement:
        constraints: ["${NODE}"] 
    ports:
      - "6006:3306"  
    networks:
      - traefik     
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: loki
      options:
        loki-url: ${LOKI_URL}   
  testlink:
    image: chusiang/testlink:latest
    restart: unless-stopped
    ports:
      - "6005:80"
    deploy:      
      placement:
        constraints: ["${NODE}"] 
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.${SERVICE_NAME}.entrypoints=web"
        - "traefik.http.routers.${SERVICE_NAME}.rule=Host(`${DOMAIN_NAME}`)"
        - "traefik.http.middlewares.${SERVICE_NAME}-http.redirectscheme.scheme=https"
        - "traefik.http.routers.${SERVICE_NAME}-https.rule=Host(`${DOMAIN_NAME}`)"
        - "traefik.http.routers.${SERVICE_NAME}-https.entrypoints=https"
        - "traefik.http.routers.${SERVICE_NAME}-https.tls=true"
        - "traefik.http.routers.${SERVICE_NAME}-https.tls.certresolver=myresolver"
        - "traefik.http.services.${SERVICE_NAME}.loadbalancer.server.port=80"    
    environment:
      - TESTLINK_DATABASE_HOST=10.250.0.68
      - TESTLINK_DATABASE_PORT_NUMBER=6006
      - TESTLINK_DATABASE_NAME=testlink
      - TESTLINK_DATABASE_USER=testlink
      - TESTLINK_DATABASE_PASSWORD=Flexxus2023**
      - TESTLINK_USERNAME=admin
      - TESTLINK_PASSWORD=admin123
      - TESTLINK_EMAIL=admin@testlink.local
    volumes:
      - testlink-uploads:/var/www/html/upload_area
    networks:
      - traefik     
    depends_on:
      - testlink-db
    logging:
      driver: loki
      options:
        loki-url: ${LOKI_URL}     

volumes:
  testlink-db-data:
    name: "${SERVICE_NAME}_testlink-db-data"
  testlink-logs:
    name: "${SERVICE_NAME}_testlink-logs"
  testlink-uploads:
    name: "${SERVICE_NAME}_testlink-uploads"
  testlink-data:
    name: "${SERVICE_NAME}_testlink-data"

networks:
  traefik:
    external:
      name: traefik-network
